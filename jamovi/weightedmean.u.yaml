title: Weighted Mean with Property Table
name: weightedMean
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: propFile
        format: string
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: weightDim
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: tableOverrides
        format: string
